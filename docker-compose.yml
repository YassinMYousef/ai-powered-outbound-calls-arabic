services:
  postgres:
    # pgvector-enabled Postgres 18 — the RAG chunk embeddings live in-database
    # (kb_chunks.embedding); the migration runs CREATE EXTENSION vector.
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: callcenter
      POSTGRES_DB: callcenter
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ images store data in a major-version subdirectory and refuse
      # to start if the volume is mounted at the old .../data path.
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - lokidata:/loki

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./backend/logs:/var/log/callcenter:ro

  grafana:
    image: grafana/grafana:11.1.4
    depends_on:
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  tei:
    # Local embedding server (HuggingFace text-embeddings-inference).
    # First start downloads intfloat/multilingual-e5-large (~2.3 GB) into tei_cache.
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: --model-id intfloat/multilingual-e5-large
    ports:
      - "8080:80"
    volumes:
      - tei_cache:/data

volumes:
  pgdata:
  lokidata:
  grafanadata:
  tei_cache: